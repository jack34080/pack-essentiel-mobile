<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pack Essentiel</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1A1B2F">
    <style>
        :root {
            --bg: #1A1B2F;
            --surface: rgba(34, 35, 58, 0.9);
            --border: rgba(167, 139, 250, 0.3);
            --text: #D2D4E8;
            --accent: #A78BFA;
            --glass: rgba(255, 255, 255, 0.05);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 50% 0%, #1e1b4b, var(--bg));
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        header h1 { font-size: 18px; font-weight: 600; }

        .container { flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 12px; }

        .chat-area {
            flex: 1;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .msg {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .msg.user { background: rgba(139, 92, 246, 0.3); align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.assistant { background: rgba(6, 182, 212, 0.15); align-self: flex-start; border-bottom-left-radius: 4px; }

        .input-area {
            display: flex;
            gap: 8px;
            padding: 10px;
            border-top: 1px solid var(--border);
        }
        .input-area input {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            color: var(--text);
            font-size: 14px;
            outline: none;
        }
        .input-area button {
            background: var(--accent);
            border: none;
            border-radius: 10px;
            padding: 12px 16px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
        }

        .modules-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .module-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        .module-card:hover { background: var(--accent); color: #fff; }

        .tab-bar {
            display: flex;
            border-top: 1px solid var(--border);
            background: var(--surface);
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            border: none;
            background: transparent;
            border-bottom: 2px solid transparent;
        }
        .tab-btn.active { border-bottom-color: var(--accent); color: var(--accent); }

        .tab-content { display: none; flex: 1; flex-direction: column; }
        .tab-content.active { display: flex; }
    </style>
</head>
<body>
    <header>
        <h1>📦 Pack Essentiel</h1>
        <span style="font-size:12px;color:var(--accent);">Mobile</span>
    </header>

    <div class="container">
        <!-- Onglets -->
        <div class="tab-bar">
            <button class="tab-btn active" data-tab="chat">💬 Chat</button>
            <button class="tab-btn" data-tab="modules">📦 Modules</button>
            <button class="tab-btn" data-tab="settings">⚙️ Réglages</button>
        </div>

        <!-- Chat -->
        <div class="tab-content active" id="chat-tab">
            <div class="chat-area">
                <div class="messages" id="messages">
                    <div class="msg assistant">🤖 Bonjour ! Je suis votre assistant mobile. Posez-moi une question.</div>
                </div>
                <div class="input-area">
                    <input type="text" id="chatInput" placeholder="Votre message...">
                    <button id="sendBtn">▶</button>
                </div>
            </div>
        </div>

        <!-- Modules -->
        <div class="tab-content" id="modules-tab">
            <div class="modules-grid" id="modulesGrid">
                <!-- rempli dynamiquement -->
            </div>
        </div>

        <!-- Réglages -->
        <div class="tab-content" id="settings-tab" style="padding:10px;overflow-y:auto;">
            <label style="font-size:13px;color:var(--text);">Modèle IA</label>
            <select id="modelSelect" style="width:100%;padding:10px;border-radius:8px;background:rgba(0,0,0,0.3);border:1px solid var(--border);color:var(--text);margin-bottom:10px;">
                <option value="deepseek-chat">DeepSeek Chat</option>
                <option value="deepseek-reasoner">DeepSeek Reasoner</option>
                <option value="gpt-4o">GPT-4o</option>
            </select>
            <label style="font-size:13px;color:var(--text);">URL Orchestrateur</label>
            <input type="text" id="orchestrateurUrl" value="http://localhost:3456" style="width:100%;padding:10px;border-radius:8px;background:rgba(0,0,0,0.3);border:1px solid var(--border);color:var(--text);margin-bottom:10px;">
            <button id="testBtn" style="background:var(--accent);border:none;border-radius:8px;padding:10px;color:#fff;font-weight:bold;width:100%;cursor:pointer;">⚡ Tester la connexion</button>
        </div>
    </div>

    <script>
        // Onglets
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
                document.getElementById(btn.dataset.tab + '-tab').classList.add('active');
            });
        });

        // Modules disponibles (sera chargé dynamiquement)
        const modulesList = [
            { name: '💬 Chat', icon: '💬' },
            { name: '🤝 Duo IA', icon: '🤝' },
            { name: '🔄 Collab IA', icon: '🔄' },
            { name: '🤖 IA Indép.', icon: '🤖' },
            { name: '📝 Bloc‑Notes', icon: '📝' }
        ];

        const grid = document.getElementById('modulesGrid');
        modulesList.forEach(m => {
            const card = document.createElement('div');
            card.className = 'module-card';
            card.innerHTML = `<div style="font-size:28px;">${m.icon}</div><div style="margin-top:6px;">${m.name}</div>`;
            card.onclick = () => {
                document.querySelector('[data-tab="chat"]').click();
                document.getElementById('chatInput').value = `Ouvre le module ${m.name}`;
                document.getElementById('sendBtn').click();
            };
            grid.appendChild(card);
        });

        // Chat
        const messages = document.getElementById('messages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = 'msg ' + role;
            div.textContent = text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        sendBtn.addEventListener('click', async () => {
            const text = chatInput.value.trim();
            if (!text) return;
            addMessage('user', text);
            chatInput.value = '';

            const url = document.getElementById('orchestrateurUrl').value || 'http://localhost:3456';
            const model = document.getElementById('modelSelect').value;
            let platform = 'deepseek';
            if (model.startsWith('gpt-')) platform = 'openai';

            try {
                const res = await fetch(url + '/call_ai', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text, model: model, platform: platform, apiKey: null })
                });
                const data = await res.json();
                const reply = data.response || data.content || '[Pas de réponse]';
                addMessage('assistant', reply);
            } catch(e) {
                addMessage('assistant', 'Erreur : ' + e.message);
            }
        });

        chatInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') sendBtn.click();
        });

        // Test connexion
        document.getElementById('testBtn').addEventListener('click', async () => {
            const url = document.getElementById('orchestrateurUrl').value;
            try {
                const res = await fetch(url + '/ping');
                const status = res.ok ? '✅ Connecté' : '❌ Échec';
                alert(status);
            } catch(e) {
                alert('❌ Impossible de joindre l\'orchestrateur');
            }
        });
    </script>
</body>
</html>
